<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="gp" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>
    <radialGradient id="gb" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>
    <radialGradient id="gc" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#06b6d4"/>
    </radialGradient>
    <radialGradient id="gt" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#14b8a6"/>
    </radialGradient>
    <radialGradient id="go" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fb923c"/><stop offset="100%" stop-color="#f97316"/>
    </radialGradient>
    <radialGradient id="gm" cx="30%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#f472b6"/><stop offset="100%" stop-color="#ec4899"/>
    </radialGradient>
  </defs>

  <!-- 6 spheres evenly spaced 60° apart on a circle (center 32,32, R=18) -->
  <!-- 210° upper-left — purple, large -->
  <circle cx="16.4" cy="23" r="7.5" fill="url(#gp)"/>
  <!-- -90° top — blue -->
  <circle cx="32"   cy="14" r="5.5" fill="url(#gb)"/>
  <!-- -30° upper-right — cyan -->
  <circle cx="47.6" cy="23" r="6"   fill="url(#gc)"/>
  <!-- 30° lower-right — pink, large -->
  <circle cx="47.6" cy="41" r="7.5" fill="url(#gm)"/>
  <!-- 90° bottom — orange -->
  <circle cx="32"   cy="50" r="6"   fill="url(#go)"/>
  <!-- 150° lower-left — teal -->
  <circle cx="16.4" cy="41" r="5.5" fill="url(#gt)"/>
</svg>
