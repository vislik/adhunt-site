<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none">
  <defs>
    <radialGradient id="g1" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#9b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>
    <radialGradient id="g2" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>
    <radialGradient id="g3" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </radialGradient>
    <radialGradient id="g4" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </radialGradient>
    <radialGradient id="g5" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#f97316"/>
    </radialGradient>
    <radialGradient id="g6" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </radialGradient>
  </defs>

  <!-- Dots icon -->
  <!-- top-left: large purple -->
  <circle cx="18" cy="20" r="13" fill="url(#g1)"/>
  <!-- top-right: medium blue -->
  <circle cx="42" cy="13" r="9" fill="url(#g2)"/>
  <!-- mid-right: cyan -->
  <circle cx="50" cy="34" r="7" fill="url(#g3)"/>
  <!-- bottom-left: teal small -->
  <circle cx="10" cy="46" r="7" fill="url(#g4)"/>
  <!-- bottom-center: orange -->
  <circle cx="28" cy="56" r="9" fill="url(#g5)"/>
  <!-- bottom-right: large pink -->
  <circle cx="47" cy="54" r="12" fill="url(#g6)"/>

  <!-- AD — bold white -->
  <text x="72" y="52" font-family="'Syne', 'Inter', system-ui, sans-serif" font-weight="800" font-size="40" fill="white" letter-spacing="-1">AD</text>

  <!-- HUNT — outline style -->
  <text x="137" y="52" font-family="'Syne', 'Inter', system-ui, sans-serif" font-weight="800" font-size="40" fill="none" stroke="white" stroke-width="2.2" stroke-linejoin="round" letter-spacing="-1">HUNT</text>
</svg>
